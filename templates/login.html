<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DistribDZ Online – Login</title>
  <meta name="description"
    content="Sign in to DistribDZ Online, the direct link between wholesalers and shop owners." />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="/static/images/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/variables.css" />
  <link rel="stylesheet" href="/static/css/main.css" />
</head>

<body class="auth-page">

  <!-- Animated background -->
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <main class="auth-container">
    <!-- Logo / Brand -->
    <header class="auth-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="12" fill="url(#brandGrad)" />
          <path d="M10 28L20 12L30 28H10Z" fill="white" opacity="0.9" />
          <circle cx="20" cy="20" r="4" fill="white" />
          <defs>
            <linearGradient id="brandGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1" />
              <stop offset="1" stop-color="#8b5cf6" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="brand-name">DistribDZ<span> Online</span></h1>
      <p class="brand-tagline">Connecting wholesalers &amp; retailers seamlessly</p>
    </header>

    <!-- Tab switcher Login / Register -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <section class="auth-card" id="form-login">
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input type="email" id="login-email" name="email" placeholder="you@example.com" required
              autocomplete="email" />
          </div>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="login-password" name="password" placeholder="••••••••" required
              autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePw('login-password', this)">👁</button>
          </div>
        </div>
        <div id="loginError" class="form-error hidden"></div>
        <button type="submit" class="btn-primary btn-full" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader hidden"></span>
        </button>
      </form>

      <!-- Demo credentials hint -->
      <div class="demo-credentials">
        <p class="demo-title">🧪 Demo Accounts</p>
        <div class="demo-grid">
          <button class="demo-chip" onclick="fillCredentials('admin@scd.com','admin123')">👑 Admin</button>
          <button class="demo-chip" onclick="fillCredentials('karim@scd.com','shop123')">🏪 Shop Owner</button>
          <button class="demo-chip" onclick="fillCredentials('youcef@scd.com','driver123')">🚛 Driver</button>
        </div>
      </div>
    </section>

    <!-- REGISTER FORM -->
    <section class="auth-card hidden" id="form-register">
      <form id="registerForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="reg-name">Full Name</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text" id="reg-name" name="name" placeholder="Your full name" required />
            </div>
          </div>
          <div class="form-group">
            <label for="reg-phone">Phone</label>
            <div class="input-wrapper">
              <span class="input-icon">📱</span>
              <input type="tel" id="reg-phone" name="phone" placeholder="+213 600 000 000" />
            </div>
          </div>
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input type="email" id="reg-email" name="email" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="reg-password" name="password" placeholder="Min. 6 characters" required />
            <button type="button" class="toggle-pw" onclick="togglePw('reg-password', this)">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <div class="role-selector">
            <label class="role-card" id="role-shop">
              <input type="radio" name="role" value="shop_owner" checked />
              <span class="role-icon">🏪</span>
              <span class="role-label">Shop Owner</span>
            </label>
            <label class="role-card" id="role-driver">
              <input type="radio" name="role" value="driver" />
              <span class="role-icon">🚛</span>
              <span class="role-label">Driver</span>
            </label>
          </div>
        </div>
        <div id="registerError" class="form-error hidden"></div>
        <div id="registerSuccess" class="form-success hidden"></div>
        <button type="submit" class="btn-primary btn-full" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader hidden"></span>
        </button>
      </form>
    </section>
  </main>

  <script src="/static/js/auth.js"></script>
</body>

</html>
